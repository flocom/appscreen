server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    # Note: GLB files (3D models) are not included - they are already compressed binary files
    # and gzip would not reduce their size (may even increase it)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_comp_level 6;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Password gate (real login page, not the browser's Basic Auth popup).
    # The included file is generated at container start from SITE_PASSWORD (see
    # docker/40-appscreen-auth.sh): without a valid auth cookie every request is
    # redirected to /login.html; login.html, /auth-check, /logout and /health stay
    # reachable. When SITE_PASSWORD is unset the gate is a no-op (site open).
    include /etc/nginx/appscreen-gate.conf;

    # Note: add_header in location blocks overrides server-level headers,
    # so security headers must be repeated here.

    # Long-cache immutable media (rarely changes, and filenames are stable).
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }

    # App code (JS/CSS): must revalidate so a redeploy is picked up immediately.
    # Filenames aren't content-hashed, so they must NOT be cached immutably —
    # otherwise browsers keep the old build (and the in-app updater can't apply).
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Cache 3D models (immutable)
    location /models/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }

    # Main application (HTML): always revalidate.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Health check endpoint — excluded from the password gate (probes need it).
    location /health {
        access_log off;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }
}
