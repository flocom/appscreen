services:
  appscreen:
    # This fork's image, published by .github/workflows/docker-publish.yml on
    # every push to main. Update with:
    #   docker compose pull && docker compose up -d        (use the latest CI build)
    # Or build the latest local source directly:
    #   docker compose up -d --build
    image: ghcr.io/flocom/appscreen:latest
    build: .
    container_name: appscreen
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s