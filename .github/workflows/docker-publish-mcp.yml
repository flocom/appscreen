name: Build and Publish MCP Server Image

# Publishes the appscreen MCP server image to GHCR on every push to main, so a
# server running Watchtower auto-deploys it (see docker-compose.prod.yml).
#
# PATH-FILTERED: only runs when the MCP server actually changed. Rebuilding on
# every merge made Watchtower restart the MCP container after web-only changes
# too — killing in-flight uploads for nothing.
on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "mcp-server/**"
      - ".github/workflows/docker-publish-mcp.yml"
  pull_request:
    branches:
      - main
    paths:
      - "mcp-server/**"
      - ".github/workflows/docker-publish-mcp.yml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
